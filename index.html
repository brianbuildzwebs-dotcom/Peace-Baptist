<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/api/manifest" />
    <title>Peace Baptist Church — Wilmington, NC</title>
    <meta name="description" content="Peace Baptist Church — An independent, fundamental Baptist church in Wilmington, NC devoted to the King James Bible, dynamic preaching, and genuine fellowship since 1975." />
    <meta property="og:title" content="Peace Baptist Church — Wilmington, NC" />
    <meta property="og:description" content="Join us in worship and fellowship. Sunday School 9:30 AM · Worship 10:30 AM · 320 Military Cutoff Rd, Wilmington, NC." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://peacebaptist.net" />
    <meta property="og:image" content="https://peacebaptist.net/images/church-exterior.jpg" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Peace Baptist" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/images/church-exterior.jpg" />
    <script>
      (function () {
        var key = 'pbc_splash_image_url';
        var cached = null;
        try { cached = localStorage.getItem(key); } catch (e) {}
        if (cached) {
          var icon = document.querySelector('link[rel="apple-touch-icon"]');
          if (icon) icon.href = cached;
        }
        fetch('/api/manifest', { cache: 'no-store' })
          .then(function (res) { return res.ok ? res.json() : null; })
          .then(function (manifest) {
            var url = manifest && manifest.icons && manifest.icons[0] && manifest.icons[0].src;
            if (!url) return;
            try { localStorage.setItem(key, url); } catch (e) {}
            var link = document.querySelector('link[rel="apple-touch-icon"]');
            if (link) link.href = url;
          })
          .catch(function () {});
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
