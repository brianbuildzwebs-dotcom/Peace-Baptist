    <script>
      (function () {
        var key = 'pbc_splash_image_url';
        var cached = null;
        try { cached = localStorage.getItem(key); } catch (e) {}
        if (cached) {
          var icon = document.querySelector('link[rel="apple-touch-icon"]');
          if (icon) icon.href = cached;
        }
        fetch('/api/manifest', { cache: 'no-store' })
          .then(function (res) { return res.ok ? res.json() : null; })
          .then(function (manifest) {
            var url = manifest && manifest.icons && manifest.icons[0] && manifest.icons[0].src;
            if (!url) return;
            try { localStorage.setItem(key, url); } catch (e) {}
            var link = document.querySelector('link[rel="apple-touch-icon"]');
            if (link) link.href = url;
          })
          .catch(function () {});
      })();
